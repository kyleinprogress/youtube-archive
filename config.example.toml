[defaults]
# Note: use `bv+ba/b` (not `bv*+ba/b`) so video-only DASH formats are preferred
# for the merge step. With `bv*`, HLS combined formats can win the sort and
# defeat the merge, producing .mp4 instead of .mkv.
format = "bv+ba/b"
# Sort keys rank available streams; they do not cap resolution. To cap
# resolution, put a constraint in format itself, such as
# format = "bv[height<=1080]+ba/b[height<=1080]"
format_sort = ["res:1080", "codec:av01", "acodec:opus"]
merge_output_format = "mkv"
min_upload_age_hours = 48
# Subtitle language preferences, tried in order. Each entry is a glob pattern
# matched against the video's available subtitle language tags (e.g. "en",
# "en-*", "en*", "*"). The first preference that matches any available tag wins;
# only one subtitle file is downloaded per video. Manual subtitles win over
# auto-generated for the same preference. Set to [] to skip subtitles entirely.
subtitle_preferences = ["en-en-US", "en-US", "en-*", "en"]

[[creator]]
slug = "example-creator" # Filesystem-safe directory name under data/.
name = "Example Creator" # Human-readable display name for logs and reports.
channel_url = "https://www.youtube.com/@example" # YouTube channel URL to archive.

